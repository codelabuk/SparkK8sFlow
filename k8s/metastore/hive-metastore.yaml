apiVersion: v1
kind: ConfigMap
metadata:
  name: metastore-config
  namespace: metastore
data:
  metastore-site.xml: |
    <?xml version="1.0"?>
    <configuration>
      <property>
        <name>javax.jdo.option.ConnectionDriverName</name>
        <value>org.postgresql.Driver</value>
      </property>
      <property>
        <name>javax.jdo.option.ConnectionURL</name>
        <value>jdbc:postgresql://postgres.metastore.svc.cluster.local:5432/metastore</value>
      </property>
      <property>
        <name>javax.jdo.option.ConnectionUserName</name>
        <value>hive</value>
      </property>
      <property>
        <name>javax.jdo.option.ConnectionPassword</name>
        <value>hivepassword</value>
      </property>
      <property>
        <name>metastore.warehouse.dir</name>
        <value>s3a://warehouse/</value>
      </property>
    </configuration>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hive-metastore
  namespace: metastore
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hive-metastore
  template:
    metadata:
      labels:
        app: hive-metastore
    spec:
      containers:
      - name: metastore
        image: apache/hive:4.0.0
        command: ["/opt/hive/bin/hive"]
        args: ["--service", "metastore"]
        ports:
        - containerPort: 9083
        volumeMounts:
        - name: metastore-config
          mountPath: /opt/hive/conf/metastore-site.xml
          subPath: metastore-site.xml
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
      volumes:
      - name: metastore-config
        configMap:
          name: metastore-config
---
apiVersion: v1
kind: Service
metadata:
  name: hive-metastore
  namespace: metastore
spec:
  ports:
  - port: 9083
  selector:
    app: hive-metastore
